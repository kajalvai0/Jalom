<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>মোঃ জাহাঙ্গীর আলম | চেয়ারম্যান প্রার্থী | ১নং বদলগাছী ইউপি</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
    <style>
        /* ===== CSS Variables ===== */
        :root {
            --primary: #0d4a2f;
            --primary-light: #1a6b40;
            --primary-dark: #082e1e;
            --gold: #c8962a;
            --gold-light: #f0c040;
            --cream: #fdf8ef;
            --white: #ffffff;
            --black: #1a1a1a;
            --gray: #6b7280;
            --shadow: 0 8px 32px rgba(13, 74, 47, 0.12);
            --radius: 16px;
            --transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --glass: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.18);
        }

        /* Dark Theme */
        [data-theme="dark"] {
            --cream: #121212;
            --white: #1e1e1e;
            --black: #f0f0f0;
            --gray: #a0a0a0;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary-dark: #0a3a24;
        }

        /* ===== Reset & Base ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Hind Siliguri', 'SolaimanLipi', sans-serif;
            background: var(--cream);
            color: var(--black);
            transition: background var(--transition), color var(--transition);
            overflow-x: hidden;
            line-height: 1.7;
        }

        /* ===== Scroll Animation ===== */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ===== Top Bar ===== */
        .topbar {
            background: var(--primary-dark);
            color: var(--gold-light);
            text-align: center;
            padding: 8px 16px;
            font-size: 13px;
            letter-spacing: 0.5px;
            font-weight: 600;
            position: relative;
            z-index: 1001;
        }

        /* ===== Theme Toggle ===== */
        .theme-toggle {
            position: fixed;
            bottom: 80px;
            right: 20px;
            z-index: 999;
            background: var(--primary);
            color: var(--gold-light);
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
            transition: transform 0.3s ease, background 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            background: var(--primary-light);
        }

        /* ===== Navbar ===== */
        nav {
            background: var(--white);
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 24px;
            transition: background var(--transition);
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.85);
        }

        [data-theme="dark"] nav {
            background: rgba(30, 30, 30, 0.9);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-brand .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--gold);
            flex-shrink: 0;
        }

        .nav-brand-text .name {
            font-size: 15px;
            font-weight: 800;
            color: var(--primary);
        }

        .nav-brand-text .seat {
            font-size: 11px;
            color: var(--gold);
            font-weight: 600;
        }

        .nav-links {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .nav-links button {
            background: none;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            color: var(--gray);
            padding: 8px 14px;
            border-radius: 8px;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-links button:hover,
        .nav-links button.active {
            background: var(--primary);
            color: var(--white);
        }

        .nav-links button.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 3px;
            background: var(--gold);
            border-radius: 2px;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 4px;
        }

        .hamburger span {
            width: 26px;
            height: 2.5px;
            background: var(--black);
            border-radius: 2px;
            transition: all 0.3s ease;
        }
        /* ===== Contact Bar ===== */
        .contact-bar {
            background: var(--gold);
            padding: 32px 20px;
            text-align: center;
        }

        .contact-bar h3 {
            font-size: 20px;
            color: var(--primary-dark);
            font-weight: 800;
            margin-bottom: 16px;
        }

        .contact-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        .contact-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            font-family: inherit;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .contact-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .btn-call {
            background: var(--primary-dark);
            color: #fff;
        }
        .btn-wa {
            background: #25d366;
            color: #fff;
        }
        .btn-fb {
            background: #1877f2;
            color: #fff;
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            .hamburger {
                display: flex;
            }
        }
    </style>
</head>
<body>
    <!-- Top Bar -->
    <div class="topbar">
        📱 যোগাযোগের জন্য এখানে ক্লিক করুন
    </div>

    <!-- Theme Toggle -->
    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>

    <!-- Navbar -->
    <nav>
        <div class="nav-brand">
            <img src="1000100819.jpg" alt="Avatar" class="avatar" />
            <div class="nav-brand-text">
                <div class="name">মোঃ জাহাঙ্গীর আলম</div>
                <div class="seat">১নং বদলগাছী ইউপি</div>
            </div>
        </div>
        <div class="nav-links">
            <button onclick="alert('হোম পেজ')">হোম</button>
            <button onclick="alert('জীবনী')">জীবনী</button>
            <button onclick="alert('ম্যানিফেস্টো')">ম্যানিফেস্টো</button>
            <button onclick="alert('গ্যালারি')">গ্যালারি</button>
            <button onclick="alert('যোগাযোগ')">যোগাযোগ</button>
        </div>
        <div class="hamburger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <!-- Contact Bar -->
    <div class="contact-bar reveal">
        <h3>📞 আমাদের সাথে যোগাযোগ করুন</h3>
        <div class="contact-btns">
            <a href="tel:+8801762726068" class="contact-btn btn-call">☎️ কল করুন</a>
            <a href="https://wa.me/8801762726068" target="_blank" class="contact-btn btn-wa">💬 হোয়াটসঅ্যাপ</a>
        </div>
    </div>

    <script>
        // Theme Toggle
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            document.querySelector('.theme-toggle').textContent = newTheme === 'dark' ? '☀️' : '🌙';
        }

        // Load saved theme
        window.addEventListener('load', () => {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.querySelector('.theme-toggle').textContent = savedTheme === 'dark' ? '☀️' : '🌙';
        });

        // Menu Toggle
        function toggleMenu() {
            const navLinks = document.querySelector('.nav-links');
            navLinks.classList.toggle('active');
        }
    </script>
</body>
</html>
